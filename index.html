<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Christian Ventura" />
    <meta
      name="description"
      content="Purpose: For use in GIT417 as the final project. Tech used: HTML, CSS, JS."
    />
    <link rel="stylesheet" href="css/styles.css" />
    <script src="js/main.js" defer></script>
    <title>Simple Computing x christian_ventura</title>
  </head>
  <body>
    <header>
      <div id="site-identity">
        <h1>Ermac</h1>
      </div>
      <div id="nav">
        <nav>
          <ul>
            <li><a href="#about">About</a></li>
            <li><a href="#sleeves">Card Sleeves</a></li>
            <li><a href="#game">Flip Game</a></li>
            <li><a href="#contact-form">Contact</a></li>
          </ul>
        </nav>
      </div>
      <button id="theme-toggle">Toggle Theme</button>
    </header>
    <main>
      <section id="hero"></section>
      <section id="about"></section>
      <section id="sleeves">
        <!-- In this section, I am going to have a carousel display that will show my favorite trading card gaming sleeves. There will be an image of the product and a button on either side to shuffle through them. -->
        <h2>Dragon Shield Sleeves</h2>

        <div class="sleeves-carousel">
          <button id="prev-sleeve" type="button" aria-label="Previous Sleeve">
            ◀
          </button>
          <div class="product-card">
            <img
              id="sleeve-image"
              src="assets/images/dragonshield-sleeves.jpeg"
              alt="Dragon shield card sleeves"
            />
            <h3 id="sleeve-name">
              <!-- ADD THIS -->
              <!-- Sleeve name will be inserted dynamically -->
            </h3>
            <p id="sleeve-description">
              <!-- ADD THIS -->
              <!-- Product description will be inserted dynamically -->
            </p>
          </div>
          <button id="next-sleeve" type="button" aria-label="Next Sleeve">
            ▶
          </button>
        </div>
      </section>
      <section id="game">
        <!-- I am going to make my game be a "bigger number wins game". The user will click a button, two cards will be flipped and the higher number on the card will win the game. Stay tuned. -->
        <h2>Magic: the Gathering Mana Value Game</h2>
        <p>
          Higher Mana Value Wins!
          <button id="flip-card-button" type="button">Flip Cards</button>
        </p>
        <div id="card-flip">
          <img
            src="assets/images/necrodominance.jpg"
            alt="The magic card chosen for player one. This card is random and changes each time the user presses the flip card button."
          />
          <img
            src="assets/images/thought-devourer.jpg"
            alt="The magic card chosen for player two. This card is random and changes each time the user presses the flip card button."
          />
          <!-- <button id="flip-card-button">Flip Cards</button> -->
          <div id="game-result">
            <!-- ADD THIS -->
            <!-- This will dynamically display the results of the mana cost game -->
          </div>
        </div>
      </section>
      <section id="contact-form">
        <div id="terminal-window">
          <!-- My goal for the form will be to make it look like a computer terminal because I like that aesthetic -->
          <form action="" method="get" class="terminal-form">
            <fieldset>
              <legend>Please fill out this form!</legend>
              <!--I understand this may be off putting but I like having the legend around my forms. This will get adjusted once I begin styling the form.-->
              <br />
              <label for="full-name">
                Name:
                <input id="full-name" name="fullName" type="text" required />
              </label>
              <br />
              <label for="phone-number">
                Phone Number:
                <input
                  id="phone-number"
                  name="phoneNumber"
                  type="tel"
                  required
                />
              </label>
              <br />
              <label for="email">
                Email:
                <input id="email" name="email" type="email" required />
              </label>
              <br />
              Please leave me a comment:
              <br />
              <label for="comments">
                <textarea
                  id="comments"
                  name="comments"
                  rows="10"
                  cols="40"
                  placeholder="your opinion matters..."
                ></textarea>
              </label>
              <br />
              <fieldset>
                <legend>Contact Preference</legend>
                <label for="phone-contact">
                  Phone
                  <input
                    id="phone-contact"
                    name="contactPreference"
                    type="radio"
                    value="Phone"
                    checked
                  />
                </label>
                <label for="email-contact">
                  Email
                  <input
                    id="email-contact"
                    name="contactPreference"
                    type="radio"
                    value="Email"
                  />
                </label>
              </fieldset>
              <label for="submit-button">
                <input id="submit-button" type="submit" />
              </label>
              <!-- I researched more about innerhtml and I want to display the success or error message of the form in real time when a user submits their information -->
              <div class="error-message"></div>
              <div class="success-message"></div>
            </fieldset>
            <br />
            <!-- these breaks are temporary and just in place to organize my form until I begin styling this section-->
          </form>
        </div>
      </section>
    </main>
    <footer>
      <section id="contacts">
        <ul>
          <li>Contact me:</li>
          <li><a href="#">Github</a></li>
          <li><a href="#">LinkedIn</a></li>
          <li>
            <a href="mailto:cventura64@outlook.com?subject=Website Inquiry">
              Email Me
            </a>
          </li>
        </ul>
        <!-- the qr code will link to either this repository, a way for someone to buy me coffee or my github -->
        <div class="qr-code"></div>
      </section>
    </footer>
  </body>
</html>
